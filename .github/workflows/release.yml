name: Build and Upload Wheels to GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build Windows Wheel (Python ${{ matrix.python-version }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    permissions:
      contents: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Mamba & Conda-Forge Umgebung einrichten (Python ${{ matrix.python-version }})
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: "latest"
          use-mamba: true

          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict

          activate-environment: occ-bridge-dev
          environment-file: environment.yml

          show-channel-urls: false
        env:
          MAMBA_NO_PROGRESS_BARS: "1"
          CONDA_SHOW_CHANNEL_URLS: "false"

      - name: run unittests
        shell: powershell
        run: |
          conda activate occ-bridge-dev
          
          pip install -e .
          
          pytest

      - name: build wheel
        shell: powershell
        run: |
          conda activate occ-bridge-dev
          python -m build --wheel

      - name: Attach wheel to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}