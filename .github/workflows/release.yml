name: Build and Upload Wheels to GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    permissions:
      contents: write

    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Setup Mamba & Conda-Forge env (Python ${{ matrix.python-version }})
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: "latest"
          use-mamba: true
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict
          activate-environment: occ-bridge-dev
          environment-file: environment.yml
          show-channel-urls: false
        env:
          MAMBA_NO_PROGRESS_BARS: "1"
          CONDA_SHOW_CHANNEL_URLS: "false"

      - name: Run pytest Unittests
        shell: bash -el {0}
        run: |
          conda activate occ-bridge-dev
          pip install -e .
          pytest

      - name: build wheel
        shell: bash -el {0}
        run: |
          conda activate occ-bridge-dev
          python -m build --wheel

      - name: Attach wheel to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-index:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generiere Index für ALLE Releases via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: python
        run: |
          import os, json, urllib.request
          
          # GitHub API nach allen Releases dieses Repos fragen
          api_url = f"https://api.github.com/repos/{os.environ['REPO']}/releases"
          req = urllib.request.Request(api_url)
          req.add_header("Authorization", f"Bearer {os.environ['GITHUB_TOKEN']}")
          req.add_header("Accept", "application/vnd.github.v3+json")
          
          with urllib.request.urlopen(req) as response:
              releases = json.loads(response.read().decode())
              
          os.makedirs("public", exist_ok=True)
          with open("public/index.html", "w") as f:
              f.write("<html><body>\n<h1>Package Index</h1>\n")
              
              for release in releases:
                  for asset in release.get("assets", []):
                      if asset["name"].endswith(".whl"):
                          download_url = asset["browser_download_url"]
                          filename = asset["name"]
                          f.write(f'<a href="{download_url}">{filename}</a><br>\n')
                          
              f.write("</body></html>\n")

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deployment
        id: deployment
        uses: actions/deploy-pages@v4