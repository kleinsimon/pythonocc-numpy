name: Build and Upload Wheels to GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    permissions:
      contents: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Mamba & Conda-Forge Umgebung einrichten (Python ${{ matrix.python-version }})
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: "latest"
          use-mamba: true
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict
          activate-environment: occ-bridge-dev
          environment-file: environment.yml
          show-channel-urls: false
        env:
          MAMBA_NO_PROGRESS_BARS: "1"
          CONDA_SHOW_CHANNEL_URLS: "false"

      - name: Tests mit pytest ausführen
        # HIER GEÄNDERT: Plattformübergreifende Shell für Conda
        shell: bash -el {0}
        run: |
          conda activate occ-bridge-dev
          pip install -e .
          pytest

      - name: Wheel bauen
        # HIER GEÄNDERT: Plattformübergreifende Shell für Conda
        shell: bash -el {0}
        run: |
          conda activate occ-bridge-dev
          python -m build --wheel

      - name: Wheel an das GitHub Release anhängen
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-index:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download wheels from Build-Job
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist

      - name: Generate Index for Release-Wheels
        shell: python
        run: |
          import os
          with open("public/index.html", "w") as f:
              f.write("<html><body>\n")
              for file in sorted(os.listdir("dist")):
                  if file.endswith(".whl"):
                      f.write(f'<a href="{file}">{file}</a><br>\n')
              f.write("</body></html>\n")

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deployment
        id: deployment
        uses: actions/deploy-pages@v4